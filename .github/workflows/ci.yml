name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out demo-typescript
        uses: actions/checkout@v4
        with:
          path: demo-typescript

      # The demo repo installs `@trulayer/sdk` via a sibling path
      # (`file:../client-typescript`) until the SDK is published to npm.
      # Check the SDK out alongside this repo so `pnpm install` can
      # resolve it. Once the package is on npm, drop this step and switch
      # `package.json` to a version specifier.
      - name: Check out client-typescript (SDK source)
        uses: actions/checkout@v4
        with:
          repository: trulayer/client-typescript
          path: client-typescript
          token: ${{ secrets.CLIENT_TYPESCRIPT_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            demo-typescript/pnpm-lock.yaml
            client-typescript/pnpm-lock.yaml

      - name: Install SDK dependencies
        working-directory: client-typescript
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        working-directory: client-typescript
        run: pnpm build

      - name: Install demo dependencies
        working-directory: demo-typescript
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: demo-typescript
        run: pnpm type-check

      - name: Smoke tests
        working-directory: demo-typescript
        env:
          TRULAYER_DRY_RUN: 'true'
        run: pnpm test

  ci:
    name: ci
    if: always()
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required checks passed"
